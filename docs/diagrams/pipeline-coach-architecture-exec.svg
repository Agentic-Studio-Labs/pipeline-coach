<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Pipeline Coach executive architecture</title>
  <desc id="desc">A six-step high-level flow from CRM ingest to delivery and audit logging.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101a"/>
      <stop offset="100%" stop-color="#0e1d30"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#13263a"/>
      <stop offset="100%" stop-color="#0f1d2d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#d5e7f9"/>
    </marker>
    <style>
      .title { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 46px; font-weight: 700; fill: #eff7ff; letter-spacing: -0.01em; }
      .subtitle { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #a4bdd5; }
      .chip { fill: #0f1d2d; stroke: rgba(255,255,255,0.18); stroke-width: 1; }
      .chipText { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #c3d8ec; }
      .section { fill: #13263a; stroke: rgba(255,255,255,0.16); stroke-width: 1.2; }
      .sectionAlt { fill: #112236; stroke: rgba(255,255,255,0.16); stroke-width: 1.2; }
      .sectionTitle { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #eff7ff; }
      .sectionBody { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #b7cce1; }
      .stepNum { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #9fc2e3; letter-spacing: 0.08em; }
      .flowLabel { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #a6c4e2; letter-spacing: 0.06em; }
      .arrowLine { stroke: #d5e7f9; stroke-width: 3.2; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .footerTitle { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #eff7ff; }
      .footerBody { font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif; font-size: 14px; font-weight: 500; fill: #c1d5e8; }
    </style>
  </defs>

  <rect width="1400" height="980" fill="url(#bg)"/>

  <text x="66" y="78" class="title">Pipeline Coach Executive Architecture</text>
  <text x="66" y="112" class="subtitle">Daily read-only CRM hygiene analysis that produces actionable AE briefs and manager escalations.</text>

  <rect x="66" y="136" width="404" height="38" rx="19" class="chip"/>
  <text x="84" y="161" class="chipText">Outcome: prioritize next-best AE actions daily</text>

  <rect x="486" y="136" width="404" height="38" rx="19" class="chip"/>
  <text x="506" y="161" class="chipText">Risk: auto-escalate critical high-value deals</text>

  <rect x="906" y="136" width="404" height="38" rx="19" class="chip"/>
  <text x="927" y="161" class="chipText">Governance: read-only with per-run audit logs</text>

  <text x="66" y="216" class="flowLabel">SYSTEM FLOW</text>

  <!-- Row 1 -->
  <rect x="66" y="238" width="392" height="154" rx="14" class="section"/>
  <text x="86" y="265" class="stepNum">STEP 1</text>
  <text x="86" y="298" class="sectionTitle">Ingest CRM data</text>
  <text x="86" y="327" class="sectionBody">Read opportunities, activities, contacts, and owner context</text>
  <text x="86" y="349" class="sectionBody">from Twenty GraphQL.</text>

  <rect x="504" y="238" width="392" height="154" rx="14" class="sectionAlt"/>
  <text x="524" y="265" class="stepNum">STEP 2</text>
  <text x="524" y="298" class="sectionTitle">Detect hygiene issues</text>
  <text x="524" y="327" class="sectionBody">Apply configurable YAML rules for staleness, missing fields,</text>
  <text x="524" y="349" class="sectionBody">and close-date risk.</text>

  <rect x="942" y="238" width="392" height="154" rx="14" class="section"/>
  <text x="962" y="265" class="stepNum">STEP 3</text>
  <text x="962" y="298" class="sectionTitle">Recommend next action</text>
  <text x="962" y="327" class="sectionBody">Generate concise suggestions with DSPy,</text>
  <text x="962" y="349" class="sectionBody">or deterministic fallback templates.</text>

  <!-- Row 2 -->
  <rect x="942" y="444" width="392" height="154" rx="14" class="sectionAlt"/>
  <text x="962" y="471" class="stepNum">STEP 4</text>
  <text x="962" y="504" class="sectionTitle">Quality-check + retry</text>
  <text x="962" y="533" class="sectionBody">Reject weak suggestions, retry per opportunity,</text>
  <text x="962" y="555" class="sectionBody">then fallback when needed.</text>

  <rect x="504" y="444" width="392" height="154" rx="14" class="section"/>
  <text x="524" y="471" class="stepNum">STEP 5</text>
  <text x="524" y="504" class="sectionTitle">Prioritize and escalate</text>
  <text x="524" y="533" class="sectionBody">Rank by severity and deal value, then route critical deals</text>
  <text x="524" y="555" class="sectionBody">to manager escalation paths.</text>

  <rect x="66" y="444" width="392" height="154" rx="14" class="sectionAlt"/>
  <text x="86" y="471" class="stepNum">STEP 6</text>
  <text x="86" y="504" class="sectionTitle">Deliver and log</text>
  <text x="86" y="533" class="sectionBody">Send emails via Resend and append per-run, per-issue</text>
  <text x="86" y="555" class="sectionBody">audit records.</text>

  <!-- Arrows -->
  <path d="M468 315 L492 315" class="arrowLine"/>
  <path d="M906 315 L930 315" class="arrowLine"/>
  <path d="M1138 402 L1138 434" class="arrowLine"/>
  <path d="M932 521 L910 521" class="arrowLine"/>
  <path d="M494 521 L470 521" class="arrowLine"/>

  <!-- Footer -->
  <rect x="66" y="654" width="626" height="254" rx="14" class="section"/>
  <text x="90" y="686" class="footerTitle">Platform ownership</text>
  <text x="90" y="718" class="footerBody">- Workflow orchestration: LangGraph</text>
  <text x="90" y="744" class="footerBody">- Action generation: DSPy + LiteLLM provider path</text>
  <text x="90" y="770" class="footerBody">- Deterministic business logic: YAML rules + priority scoring</text>
  <text x="90" y="796" class="footerBody">- Delivery channel: Resend email</text>
  <text x="90" y="822" class="footerBody">- Auditability: JSONL run + issue records</text>

  <rect x="708" y="654" width="626" height="254" rx="14" class="sectionAlt"/>
  <text x="732" y="686" class="footerTitle">v1 boundaries</text>
  <text x="732" y="718" class="footerBody">- Read-only against CRM (no write-back)</text>
  <text x="732" y="744" class="footerBody">- Single-tenant deployment model</text>
  <text x="732" y="770" class="footerBody">- Email delivery only (Slack deferred)</text>
  <text x="732" y="796" class="footerBody">- Daily scheduled run or manual run-once mode</text>
  <text x="732" y="822" class="footerBody">- Extensible for v2 integrations</text>
</svg>
